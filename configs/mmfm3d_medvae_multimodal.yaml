# MMFM v1 vectorized baseline
#
# Baseline intended to stay close to the original MMFM idea while keeping the
# MedVAE encoder/decoder unchanged:
#   volume 3D -> MedVAE latent tensor -> flatten -> vector MMFM -> unflatten ->
#   MedVAE decode.
#
# The MMFM core is vectorized on the flattened latent. The dataset still uses
# the existing 15 domain classes (3 modalities x 5 fields) as discrete target
# conditions, so the baseline remains directly comparable with the previous
# multimodal prototype.

method: mmfm3d_vectorized_v1
task_name: mmfm3d_medvae_multimodal_vectorized_v1

vae:
  vae_type: medvae
  source: local
  model_name: medvae_4_1_3d
  checkpoint: "outputs/medvae/runs/medvae_finetune_all/weights/model_best.pth"

model:
  hidden_dim: 1024
  num_blocks: 4
  time_embed_dim: 256
  class_embed_dim: 128
  dropout: 0.0

data:
  split: retro_train
  modalities: [T1W, T2W, T2FLAIR]
  fields: [0.1T, 1.5T, 3T, 5T, 7T]
  output_subdir: cfm3d/runs/mmfm3d_medvae_multimodal_vectorized_v1
  percentile_lower: 0.5
  percentile_upper: 99.5
  target_spacing: [1.0, 1.0, 1.0]
  volume_size: [128, 128, 80]
  max_volumes_per_class: null

train:
  batch_size: 1
  num_workers: 4
  total_iters: 30000
  lr: 1.0e-4
  sigma: 0.0
  ot_method: exact
  save_every: 2000
  print_every: 100
  use_amp: true
  amp_dtype: bf16
  grad_clip: 1.0
  ema_decay: 0.9999
  num_targets_per_step: 2
