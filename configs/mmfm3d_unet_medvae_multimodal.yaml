# ─────────────────────────────────────────────────────────────────────────────
# MMFM-UNet 3D — Any-to-any multimodal (T1W + T2W + T2FLAIR × 5 champs)
#
# Extension de MMFM-MLP (train_mmfm_3d.py) avec un UNet 3D spatial (MONAI
# DiffusionModelUNet) à la place du MLP vectoriel.
#
# Différences vs MMFM-MLP (mmfm3d_medvae_multimodal.yaml) :
#   - Architecture : UNet 3D spatial au lieu de MLP résiduel sur vecteur aplati
#   - Latent spatial (B, C, H', W', D') — pas de flatten
#   - Conditioning : AdaGN profond à chaque résolution (temps + classe)
#   - num_class_embeds : 15 (3 mod × 5 champs) au lieu de 5 (champs seuls dans CFM)
#
# Différences vs CFM MedVAE (cfm3d_T1W_medvae.yaml) :
#   - Multimodal (3 modalités × 5 champs = 15 classes)
#   - 15 loaders séparés (option A : 1 loader par classe)
#   - Script : train_mmfm_unet_3d.py
#
# Lancement local :
#   bash src/slurm/launch_cfm3d_dgx.sh mmfm_unet T1W 4 \
#       configs/mmfm3d_unet_medvae_multimodal.yaml
#
# Lancement Jean Zay (4×H100) :
#   sbatch src/slurm/cfm_3d_jeanzay.slurm mmfm_unet T1W \
#       configs/mmfm3d_unet_medvae_multimodal.yaml
# ─────────────────────────────────────────────────────────────────────────────

method: mmfm3d_unet
task_name: mmfm3d_unet_medvae_multimodal

vae:
  vae_type: medvae_finetune
  model_name: medvae_4_1_3d
  frozen: true
  checkpoint: outputs/medvae/runs/medvae_finetune_all/weights/model_best.pth

model:
  # UNet 3D MONAI DiffusionModelUNet
  model_channels: 128
  channel_mult:
  - 1
  - 2
  - 4
  num_res_blocks: 2
  attention_levels:
  - false
  - true
  - true
  num_head_channels: 64
  norm_num_groups: 32
  use_flash_attention: false
  use_gradient_checkpointing: true
  # 3 modalités × 5 champs = 15 classes (vs 5 dans CFM mono-modal)
  num_class_embeds: 15

data:
  modalities:
  - T1W
  - T2W
  - T2FLAIR
  fields:
  - 0.1T
  - 1.5T
  - 3T
  - 5T
  - 7T
  volume_size:
  - 128
  - 128
  - 80
  target_spacing:
  - 1.0
  - 1.0
  - 1.0
  split: retro_train
  output_subdir: cfm3d/runs/mmfm3d_unet_medvae_multimodal
  percentile_lower: 0.5
  percentile_upper: 99.5
  max_volumes_per_class:
  num_workers: 4

train:
  batch_size: 2
  total_iters: 150000
  num_targets_per_step: 2
  lr: 1.0e-4
  sigma: 0.0
  ot_method: exact
  save_every: 5000
  print_every: 200
  use_amp: true
  amp_dtype: bf16
  grad_clip: 1.0
  ema_decay: 0.9999

inference:
  n_steps: 50
  ode_solver: euler
  norm_mode: global
