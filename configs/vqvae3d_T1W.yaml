method: vqvae3d
task_name: vqvae3d_T1W

# Référence des hyperparamètres passés à src/vae3d/train_vqvae.py
# (le script utilise argparse — ces valeurs sont documentées ici et
#  reproduites dans les scripts SLURM)

model:
  base_channels: 32
  channel_multipliers: [1, 2, 4, 4]
  anat_channels: 64
  mod_channels: 32
  codebook_size: 1024
  vq_decay: 0.99
  vq_beta: 0.25

data:
  modalities: [T1W, T2W, T2FLAIR]
  fields: [0.1T, 1.5T, 3T, 5T, 7T]
  splits: [retro_train]
  volume_size: [112, 128, 80]
  paired_prob: 0.5
  percentile_lower: 0.5
  percentile_upper: 99.5
  output_subdir: vqvae3d/runs/vqvae3d_T1W   # relatif à output_root

train:
  batch_size: 1
  num_workers: 16         # Jean Zay H100 (4×H100, 64 CPUs/nœud)
  steps: 20000
  lr: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  lambda_recon: 1.0
  lambda_vq: 1.0
  lambda_adv: 1.0e-3
  lambda_cross: 0.5
  adv_grl_lambda: 0.5
  cross_start_step: 500
  cross_ramp_steps: 1000
  adv_start_step: 1500
  adv_ramp_steps: 1000
  save_every: 2000        # model_best uniquement (pas d'intermédiaires)
  print_every: 20
  use_amp: true
  gradient_checkpointing: true

  # Multi-GPU (DDP via torchrun)
  dist_backend: nccl
