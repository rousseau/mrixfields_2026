method: cfm2d
task_name: cfm2d_T1W_TEST

model:
  img_size: 512
  model_channels: 128
  num_res_blocks: 2
  use_gradient_checkpointing: true

data:
  modality: T1W
  split: retro_train
  # Chemins résolus depuis configs/env/{local,jeanzay}.yaml + ces sous-chemins
  preprocessed_subdir: stargan2d/preprocessed
  output_subdir: cfm2d/runs/cfm2d_T1W_TEST
  domains:
    - 0.1T
    - 1.5T
    - 3T
    - 5T
    - 7T

train:
  batch_size: 4
  num_workers: 2
  total_iters: 500
  lr: 0.0001
  sigma: 0.0
  save_every: 200
  print_every: 100

inference:
  n_steps: 10
  source_field: 0.1T
