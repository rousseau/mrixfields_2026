# ─────────────────────────────────────────────────────────────────────────────
# MMFM-UNet V2 continuation — reduced random crop
#
# Resumes from mmfm3d_unet_v2_medvae_multimodal/checkpoint_115000.pth
# Changes vs original:
#   - random_crop_prob: 0.3 (was 0.8) to reduce train/inference mismatch
#   - same architecture, same LR schedule (cosine decay continues)
#   - total_iters kept at 150000 (will stop there if resumed)
# ─────────────────────────────────────────────────────────────────────────────

method: mmfm3d_unet_v2
# Use the original task_name so resume finds the same output dir
# If you want a new run, change task_name and output_subdir.
task_name: mmfm3d_unet_v2_medvae_multimodal

vae:
  vae_type: medvae_finetune
  model_name: medvae_4_1_3d
  frozen: true
  checkpoint: outputs/medvae/runs/medvae_finetune_all/weights/model_best.pth

model:
  model_channels: 128
  channel_mult:
  - 1
  - 2
  num_res_blocks: 2
  attention_levels:
  - false
  - true
  num_head_channels: 64
  norm_num_groups: 32
  use_flash_attention: false
  use_gradient_checkpointing: true
  num_class_embeds: 15
  use_factorized_attention: true
  factorized_attn_heads: 8
  factorized_attn_dropout: 0.0

data:
  modalities:
  - T1W
  - T2W
  - T2FLAIR
  fields:
  - 0.1T
  - 1.5T
  - 3T
  - 5T
  - 7T
  volume_size:
  - 128
  - 128
  - 80
  target_spacing:
  - 1.0
  - 1.0
  - 1.0
  split: retro_train
  output_subdir: cfm3d/runs/mmfm3d_unet_v2_medvae_multimodal
  percentile_lower: 0.5
  percentile_upper: 99.5
  max_volumes_per_class:
  num_workers: 4

  random_crop_prob: 0.3
train:
  batch_size: 4
  total_iters: 150000
  num_targets_per_step: 2
  lr: 1.0e-4
  sigma: 0.0
  ot_method: exact
  save_every: 5000
  print_every: 200
  use_amp: true
  amp_dtype: bf16
  grad_clip: 1.0
  ema_decay: 0.9999

inference:
  n_steps: 50
  ode_solver: euler
  norm_mode: global
