# MMFM v2 Vectorized baseline
#
# This version implements a continuous field scale:
# - Modality is discrete (3 classes)
# - Field is continuous (mapping index to [0, 1])
#
# The model architecture remains a residual MLP, but the training loop
# is updated to perform transitions in global time space.
#
# Comparison Target:
# - v1 (discret domain)
# - v2 (continu champ)
# - UNet multi-marginal
#
# Mapping: 0.1T -> 0.0, 1.5T -> 0.25, 3T -> 0.5, 5T -> 0.75, 7T -> 1.0
#
# Note: a single unified model is used for all modalities.
#
method: mmfm3d_vectorized_v2
task_name: mmfm3d_medvae_multimodal_vectorized_v2
#
# V2-Specific parameters (passed via CLI or extended by the trainer)
# - adjacent_only: True (recommended for starting)
# - identity_prob: 0.1
#
vae:
  vae_type: medvae_finetune
  source: local
  model_name: medvae_4_1_3d
  frozen: true
  checkpoint: "outputs/medvae/runs/medvae_finetune_all/weights/model_best.pth"
#
model:
  hidden_dim: 1024
  num_blocks: 4
  time_embed_dim: 256
  class_embed_dim: 128
  dropout: 0.0
#
data:
  split: retro_train
  modalities: [T1W, T2W, T2FLAIR]
  fields: [0.1T, 1.5T, 3T, 5T, 7T]
  output_subdir: cfm3d/runs/mmfm3d_medvae_multimodal_vectorized_v2
  percentile_lower: 0.5
  percentile_upper: 99.5
  target_spacing: [1.0, 1.0, 1.0]
  volume_size: [128, 128, 80]
  max_volumes_per_class:
  random_crop_prob: 0.8
#
train:
  batch_size: 1
  num_workers: 4
  total_iters: 50000
  lr: 1.0e-4
  sigma: 0.0
  ot_method: exact
  save_every: 2000
  print_every: 100
  use_amp: true
  amp_dtype: bf16
  grad_clip: 1.0
  ema_decay: 0.9999
  num_targets_per_step: 1 # In v2, we typically sample 1 target transition per step
