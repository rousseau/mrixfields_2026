method: medvae_finetune
# MedVAE fine-tuning — multimodal (T1W + T2W + T2FLAIR), all fields.
# Phase D of MRIxFields 2026 VAE comparison plan.
#
# Three training modes (controlled by vae.frozen):
#   frozen          : no gradient through VAE — evaluate pretrained quality
#   decoder_only    : fine-tune decoder + post_quant_conv only (lightweight)
#   false           : full fine-tuning (encoder + decoder)
task_name: medvae_finetune_multimodal

vae:
  vae_type: medvae_finetune
  model_name: medvae_4_1_3d        # 'medvae_4_1_3d' (1-ch, 4× down) or 'medvae_8_1_3d' (1-ch, 8× down)
  frozen: decoder_only             # frozen | decoder_only | false
  kl_weight: 1.0e-6
  checkpoint: null                  # path to local fine-tuned checkpoint (null = HuggingFace pretrained)

data:
  modalities:
    - T1W
    - T2W
    - T2FLAIR
  fields:
    - 0.1T
    - 1.5T
    - 3T
    - 5T
    - 7T
  splits:
    - retro_train
  # MedVAE native input size (NOT 128³ — MedVAE expects 112×128×80)
  patch_size: [112, 128, 80]
  target_spacing: [1.0, 1.0, 1.0]
  percentile_lower: 0.5
  percentile_upper: 99.5
  output_subdir: medvae/runs/medvae_finetune_multimodal

train:
  batch_size: 2
  num_workers: 4
  total_epochs: 50
  lr: 5.0e-5
  save_every_epochs: 5
  print_every: 50
  use_amp: true
  grad_clip: 1.0

  # Multi-GPU (DDP via torchrun)
  dist_backend: nccl
  resume: null
