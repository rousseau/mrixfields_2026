method: cfm3d
vae:
  vae_type: medvae
  source: frozen
  checkpoint: outputs/vae3d/runs/vae3d_T1W/weights/model_best.pth
  vae_config: configs/vae3d_T1W.yaml
  model_name: medvae_4_1_3d
model:
  spatial_dims: 3
  model_channels: 128
  num_res_blocks: 2
  channel_mult:
  - 1
  - 2
  - 4
  attention_levels:
  - false
  - true
  - true
  num_head_channels: 64
  use_gradient_checkpointing: true
  use_flash_attention: false
  norm_num_groups: 32
data:
  modality: T1W
  split: retro_train
  output_subdir: cfm3d/runs/cfm3d_{{TASK_NAME}}
  domains:
  - 0.1T
  - 1.5T
  - 3T
  - 5T
  - 7T
  percentile_lower: 0.5
  percentile_upper: 99.5
  target_spacing:
  - 1.0
  - 1.0
  - 1.0
  volume_size:
  - 112
  - 128
  - 80
  max_volumes_per_domain:
train:
  batch_size: 2
  num_workers: 4
  total_iters: 150000
  lr: 0.0001
  sigma: 0.0
  ot_method: exact
  save_every: 5000
  print_every: 200
  use_amp: true
  grad_clip: 1.0
  ema_decay: 0.9999
inference:
  n_steps: 50
  ode_solver: euler
  source_domain: 0.1T
  vae_decode_patch_size:
  - 64
  - 64
  - 64
  vae_decode_overlap: 0.25
  norm_mode: global
task_name: cfm3d_T1W_medvae_frozen
