# ─────────────────────────────────────────────────────────────────────────────
# MMFM-UNet V2 — Hybrid with Factorized 3D Attention
#
# Improvements over V1:
#   - channel_mult: [1, 2]  (bottleneck at /2 instead of /4)
#   - FactorizedAttention3D (axial attention H→W→D) at bottleneck
#   - batch_size: 4 (less downsampling = more memory headroom)
#
# Architecture goal: global receptive field at bottleneck without O(N^6) cost.
# ─────────────────────────────────────────────────────────────────────────────

method: mmfm3d_unet_v2
task_name: mmfm3d_unet_v2_medvae_multimodal

vae:
  vae_type: medvae_finetune
  model_name: medvae_4_1_3d
  frozen: true
  checkpoint: outputs/medvae/runs/medvae_finetune_all/weights/model_best.pth

model:
  model_channels: 128
  channel_mult:
  - 1
  - 2
  num_res_blocks: 2
  attention_levels:
  - false
  - true
  num_head_channels: 64
  norm_num_groups: 32
  use_flash_attention: false
  use_gradient_checkpointing: true
  num_class_embeds: 15
  # NEW V2 parameters
  use_factorized_attention: true
  factorized_attn_heads: 8
  factorized_attn_dropout: 0.0

data:
  modalities:
  - T1W
  - T2W
  - T2FLAIR
  fields:
  - 0.1T
  - 1.5T
  - 3T
  - 5T
  - 7T
  volume_size:
  - 128
  - 128
  - 80
  target_spacing:
  - 1.0
  - 1.0
  - 1.0
  split: retro_train
  output_subdir: cfm3d/runs/mmfm3d_unet_v2_medvae_multimodal
  percentile_lower: 0.5
  percentile_upper: 99.5
  max_volumes_per_class:
  num_workers: 4

  random_crop_prob: 0.8
train:
  batch_size: 4
  total_iters: 150000
  num_targets_per_step: 2
  lr: 1.0e-4
  sigma: 0.0
  ot_method: exact
  save_every: 5000
  print_every: 200
  use_amp: true
  amp_dtype: bf16
  grad_clip: 1.0
  ema_decay: 0.9999

inference:
  n_steps: 50
  ode_solver: euler
  norm_mode: global
