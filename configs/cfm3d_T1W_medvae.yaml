method: cfm3d
task_name: cfm3d_T1W_medvae_frozen

# ─── VAE utilisé pour l'encodage latent ───────────────────────────────────────
# Étape 2 : MedVAE (StanfordMIMI) — version frozen (poids HuggingFace)
# https://github.com/StanfordMIMI/MedVAE
# Installation : pip install medvae
vae:
  vae_type: medvae # aekl | medvae | vqvae
  source: frozen # frozen (HuggingFace) | local (fine-tuné)
  model_name: medvae_4_1_3d # medvae_4_1_3d (4ch, 1x) | medvae_8_1_3d (1ch, 8x)
  # checkpoint: null            # null = poids HuggingFace originaux
  # checkpoint: "outputs/medvae/runs/medvae_T1W/weights/model_final.pth"  # si fine-tuné

# ─── UNet 3D pour le flow matching ────────────────────────────────────────────
# in_channels et out_channels sont calculés automatiquement depuis vae.latent_channels
model:
  spatial_dims: 3
  model_channels: 128
  num_res_blocks: 2
  channel_mult: [1, 2, 4]
  attention_levels: [false, true, true]
  num_head_channels: 64
  use_gradient_checkpointing: true
  use_flash_attention: false
  norm_num_groups: 32

data:
  modality: T1W
  split: retro_train
  output_subdir: cfm3d/runs/cfm3d_T1W_medvae_frozen
  domains:
    - 0.1T
    - 1.5T
    - 3T
    - 5T
    - 7T
  percentile_lower: 0.5
  percentile_upper: 99.5
  target_spacing: [1.0, 1.0, 1.0]
  volume_size: [112, 128, 80]
  max_volumes_per_domain: null

train:
  batch_size: 2
  num_workers: 4
  total_iters: 150000
  lr: 1.0e-4
  sigma: 0.0
  ot_method: exact
  save_every: 5000
  print_every: 200
  use_amp: true
  grad_clip: 1.0
  ema_decay: 0.9999

inference:
  n_steps: 50
  ode_solver: euler
  source_domain: 0.1T
