method: pythae_rhvae3d
# Pythae RHVAE 3D multimodal : Riemannian Hamiltonian VAE
# Latent vectoriel (B, D_lat) — compatible MMFM vectorisé (Étape 4).
#
# Particularités :
#   - Leapfrog HMC géré par Pythae (n_lf pas en back-prop, mais en sampling)
#   - update_metric() appelé en fin de chaque epoch
#   - AMP désactivé par défaut (leapfrog instable en fp16)
#   - latent_dim ≪ AEKL/PythaeVAE : 256 ou 512 (vectoriel global)
task_name: pythae_rhvae3d_multimodal

vae:
  vae_type: pythae_rhvae
  latent_dim: 32            # Réduit depuis 256 : métrique stocke N×D² en GPU
                            # 1939 × 32² = 2M valeurs vs 1939 × 256² = 127M
  base_channels: 16         # Réduit depuis 32 : backbone partagé ×3 (enc+dec+metric)
  num_groups: 8
  spatial_size: 16          # 128/8 = 16 (3 stride-2 downsamples)
  # RHVAE hyper-paramètres
  n_lf: 3                   # Nombre de steps leapfrog (chaque step = 2 backward)
  eps_lf: 0.01              # Augmenté depuis 0.001 : pas plus grand pour couvrir l'espace
  beta_zero: 0.3            # Température initiale inverse
  temperature: 1.5          # Température de la métrique (bandwidth RBF dans latent)
  regularization: 0.01      # Lambda de régularisation de la métrique
  checkpoint: ""

data:
  modalities:
    - T1W
    - T2W
    - T2FLAIR
  fields:
    - 0.1T
    - 1.5T
    - 3T
    - 5T
    - 7T
  splits:
    - retro_train
  patch_size: [128, 128, 128]
  target_spacing: [1.0, 1.0, 1.0]
  percentile_lower: 0.5
  percentile_upper: 99.5
  output_subdir: pythae_rhvae3d/runs/pythae_rhvae3d_multimodal

train:
  batch_size: 2             # Augmenté depuis 1 : n_lf=3 → 6 backward/step, mais petit batch OK
  num_workers: 4
  total_epochs: 200
  lr: 1.0e-4
  save_every_epochs: 10
  print_every: 50
  use_amp: false            # Désactivé : leapfrog avec autograd.grad instable en fp16
  grad_clip: 1.0
  dist_backend: nccl
  resume: null
