method: pythae_rhvae3d
# Pythae RHVAE 3D multimodal : Riemannian Hamiltonian VAE
# Latent vectoriel (B, D_lat) — compatible MMFM vectorisé (Étape 4).
#
# Particularités :
#   - Leapfrog HMC géré par Pythae (n_lf pas en back-prop, mais en sampling)
#   - update_metric() appelé en fin de chaque epoch
#   - AMP désactivé par défaut (leapfrog instable en fp16)
#   - latent_dim ≪ AEKL/PythaeVAE : 256 ou 512 (vectoriel global)
task_name: pythae_rhvae3d_multimodal

vae:
  vae_type: pythae_rhvae
  latent_dim: 256           # Dimension vectorielle du latent
  base_channels: 32         # Canaux de base (×2, ×4, ×8 dans l'encodeur)
  num_groups: 8             # GroupNorm
  spatial_size: 16          # Taille spatiale après downsampling ×8 (128/8=16)
  # RHVAE hyper-paramètres
  n_lf: 3                   # Nombre de steps leapfrog
  eps_lf: 0.001             # Pas du leapfrog
  beta_zero: 0.3            # Température initiale inverse
  temperature: 1.5          # Température de la métrique
  regularization: 0.01      # Lambda de régularisation de la métrique
  checkpoint: ""

data:
  modalities:
    - T1W
    - T2W
    - T2FLAIR
  fields:
    - 0.1T
    - 1.5T
    - 3T
    - 5T
    - 7T
  splits:
    - retro_train
  patch_size: [128, 128, 128]
  target_spacing: [1.0, 1.0, 1.0]
  percentile_lower: 0.5
  percentile_upper: 99.5
  output_subdir: pythae_rhvae3d/runs/pythae_rhvae3d_multimodal

train:
  batch_size: 1
  num_workers: 4
  total_epochs: 200
  lr: 1.0e-4
  save_every_epochs: 10
  print_every: 50
  use_amp: false            # Désactivé : leapfrog instable en fp16
  grad_clip: 1.0
  dist_backend: nccl
  resume: null
