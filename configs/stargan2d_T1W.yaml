task: 3
task_name: task3_any_to_any_T1W_TEST
method: stargan_v2
model:
  img_size: 512
  style_dim: 64
  latent_dim: 16
  num_domains: 5
  max_conv_dim: 512
  input_nc: 1
domains:
- 0.1T
- 1.5T
- 3T
- 5T
- 7T
data:
  modalities:
  - T1W
  crop_size:
  - 512
  - 512
  slice_axis: 2
pretrain:
  split: retro_train
  batch_size: 4
  num_workers: 4
  total_iters: 200
  lr: 0.0001
  f_lr: 1.0e-06
  beta1: 0.0
  beta2: 0.99
  weight_decay: 0.0001
  lambda_reg: 1.0
  lambda_sty: 1.0
  lambda_ds: 1.0
  lambda_cyc: 1.0
  ds_iter: 100
  ema_beta: 0.999
  save_every: 200
  print_every: 10
finetune:
  split: pro_train
  batch_size: 4
  num_workers: 4
  lr: 5.0e-05
  beta1: 0.5
  beta2: 0.999
  epochs: 50
  save_every: 10
  loss_l1: 1.0
  loss_lpips: 0.1
  loss_ssim: 0.0
  loss_edge: 0.0
